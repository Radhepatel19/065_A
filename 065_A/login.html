<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Student Login</h2>
        <form id="loginForm" action="dashboard.html"> 
            <label for="enrolment">Enrolment Number</label>
            <input type="text" id="enrolment" name="enrolment" placeholder="Enter your enrolment number" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit" >Login</button>
        </form>
        <p class="link-text">Forgot password? <a href="registration.html">Click here</a></p>
    </div>
</body>
</html>
