<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Student Registration</h2>
        <form action="login.html" method="POST">
            <label for="studentname">Student Name</label>
            <input type="text" id="studentname" name="studentname" placeholder="Enter your full name" required>
            
            <label for="enrolment">Enrolment Number</label>
            <input type="text" id="enrolment" name="enrolment" placeholder="Enter your enrolment number" required>
            
            <label for="email">Email ID</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            
            <button type="submit" >Register</button>
        </form>
        <p class="link-text">Already registered? <a href="home/student/Desktop/065_A/login.html">Login here</a></p>
    </div>
</body>
</html>
